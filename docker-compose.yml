services:
  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=knowledge_db;Username=postgres;Password=${POSTGRES_PASSWORD}
      - OpenAI__ApiKey=${OPENAI_API_KEY}
      - GitHub__WebhookSecret=${GITHUB_WEBHOOK_SECRET}
      - Line__ChannelAccessToken=${LINE_CHANNEL_ACCESS_TOKEN}
      - Line__ChannelSecret=${LINE_CHANNEL_SECRET}
    volumes:
      - dp_keys:/root/.aspnet/DataProtection-Keys  # дїќз•™еЉ еЇ†й‡‘й‘°пјЊйЃїе…Ќй‡Ќе•џеѕЊ Cookie е¤±ж•€
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: knowledge_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d knowledge_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  dp_keys:
